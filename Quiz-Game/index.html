<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quiz Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?
        family=Poppins:100,100italic,200,200italic,300,
        300italic,regular,italic,500,500italic,600,600italic,700,
        700italic,800,800italic,900,900italic" rel="stylesheet" 
    />
</head>
<body>
    <div class="container">
                            <!-- SECTION ONE -->

            <div class="screen active" id="start-screen">
                <h1>Quiz Time!</h1>
                <p>Test your knowledge with this few questions </p>
                <button class="start-btn" id="start-button">Start Quiz</button>
            </div>

                            <!-- SECTION TWO -->

            <div class="screen" id="quiz-screen">
                <div class="quiz-header">
                    <h2 id="question-text">Questions goes here</h2>
                    <div class="quiz-info">
                        <p>Question <span id="current-question">1</span> of <span id="total-questions"></span></p>
                        <p>Scores: <span id="score">0</span></p>
                    </div>
                </div>

                <div class="answers-container" id="answers-container">
                    <!-- Answer buttons will be inserted here from js -->
                </div>

                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
            </div>

                            <!-- SECTION THREE -->

        <div class="screen" id="result-screen">
            <h1>Quiz Results</h1>
            <div class="result-info">
                <p>You scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>
                <div id="result-message">Good Job!</div>
            </div>
            <button id="restart-button">Restart Quiz</button>
        </div>

    </div>
    <script src="script.js"></script>

</body>
</html>
